version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/PlanningPoker"
    schedule:
      interval: "weekly"
    groups:
      shared-project:
        patterns:
          - "*"
    assignees:
      - "ianwold"

  - package-ecosystem: "nuget"
    directory: "/PlanningPoker.Server"
    schedule:
      interval: "weekly"
    groups:
      server-project:
        patterns:
          - "*"
    assignees:
      - "ianwold"

  - package-ecosystem: "nuget"
    directory: "/PlanningPoker.Client"
    schedule:
      interval: "weekly"
    groups:
      blazor-client-project:
        patterns:
          - "*"
    assignees:
      - "ianwold"
